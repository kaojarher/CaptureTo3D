<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D 行動相機建模工具 v2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-dark: #111827;
            --panel-bg: rgba(31, 41, 55, 0.9);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(0, 0, 0, 0.5);
            padding: 12px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            z-index: 10;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        #container {
            flex: 1;
            position: relative;
            width: 100%;
            background: #000;
        }

        video, #three-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #three-canvas {
            display: none;
            z-index: 5;
        }

        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .control-panel {
            position: relative;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: white;
        }

        .btn-primary { background: var(--primary); }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-secondary { background: rgba(255, 255, 255, 0.15); }

        .hidden { display: none !important; }
        #info-text { font-size: 0.85rem; color: #9ca3af; text-align: center; }
    </style>
</head>
<body>

    <header>3D SCANNER v2</header>

    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="capture-canvas" style="display:none;"></canvas>
        <div id="three-canvas"></div>

        <div id="loading-overlay">
            <div class="spinner"></div>
            <p id="loading-text">正在分析影像結構...</p>
        </div>
    </div>

    <div class="control-panel">
        <p id="info-text">請將鏡頭對準物體，保持光線充足</p>
        
        <div id="capture-menu" class="btn-group">
            <button class="btn-primary" onclick="captureAndProcess()">📸 拍攝並生成 3D 模型</button>
        </div>

        <div id="preview-menu" class="btn-group hidden">
            <button class="btn-secondary" onclick="resetScanner()">🔄 重拍</button>
            <button class="btn-primary" onclick="exportOBJ()">💾 OBJ</button>
            <button class="btn-primary" onclick="exportSTL()">💾 STL</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const captureCanvas = document.getElementById('capture-canvas');
        const threeCanvas = document.getElementById('three-canvas');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const captureMenu = document.getElementById('capture-menu');
        const previewMenu = document.getElementById('preview-menu');
        const infoText = document.getElementById('info-text');

        let scene, camera, renderer, controls, currentMesh;
        const GRID_SIZE = 80; // 調整為超穩定網格大小，確保運算與著色瞬間完成

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 640 } },
                    audio: false
                });
                video.srcObject = stream;
                // 確保影片播放
                video.play();
            } catch (err) {
                alert('相機啟動失敗，請確認已開啟權限並使用 HTTPS 環境：' + err.message);
            }
        }

        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111827);

            camera = new THREE.PerspectiveCamera(45, threeCanvas.clientWidth / threeCanvas.clientHeight, 0.1, 1000);
            camera.position.set(0, 35, 45);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(threeCanvas.clientWidth, threeCanvas.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            threeCanvas.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // 強化光源，避免暗色模型看不清
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight1.position.set(20, 40, 20);
            scene.add(dirLight1);

            const dirLight2 = new THREE.DirectionalLight(0x4f46e5, 0.5); // 補一個帶有科技感的藍色環境光
            dirLight2.position.set(-20, -10, -20);
            scene.add(dirLight2);

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            if (renderer && scene && camera) renderer.render(scene, camera);
        }

        function onWindowResize() {
            if (!camera || !renderer) return;
            camera.aspect = threeCanvas.clientWidth / threeCanvas.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(threeCanvas.clientWidth, threeCanvas.clientHeight);
        }

        // 核心修正：穩定的影像處理與 3D 轉換
        async function captureAndProcess() {
            if (video.videoWidth === 0 || video.videoHeight === 0) {
                alert("相機影像尚未就緒，請稍候再試。");
                return;
            }

            showLoading("擷取並優化影像中...");
            await delay(200);

            // 1. 擷取畫面
            captureCanvas.width = GRID_SIZE;
            captureCanvas.height = GRID_SIZE;
            const ctx = captureCanvas.getContext('2d');
            
            // 安全裁切正方形
            const minDim = Math.min(video.videoWidth, video.videoHeight);
            const sx = (video.videoWidth - minDim) / 2;
            const sy = (video.videoHeight - minDim) / 2;
            ctx.drawImage(video, sx, sy, minDim, minDim, 0, 0, GRID_SIZE, GRID_SIZE);

            // 2. 影像轉換（計算深度與高度圖）
            const imgData = ctx.getImageData(0, 0, GRID_SIZE, GRID_SIZE);
            const pixels = imgData.data;
            const heights = new Float32Array(GRID_SIZE * GRID_SIZE);

            for (let i = 0; i < pixels.length; i += 4) {
                let gray = 0.299 * pixels[i] + 0.587 * pixels[i+1] + 0.114 * pixels[i+2];
                // 強化對比度
                gray = (gray - 128) * 1.3 + 128;
                heights[i / 4] = Math.max(0, Math.min(255, gray)) / 255.0;
            }

            // 3. 建構 3D 實體頂點資料 (直接使用無索引三角面，保證 100% 成功渲染)
            const vertices = [];
            const normals = [];
            const cellSize = 30 / GRID_SIZE;
            const offset = 15;

            for (let y = 0; y < GRID_SIZE - 1; y++) {
                for (let x = 0; x < GRID_SIZE - 1; x++) {
                    // 取得相鄰四個點的高度
                    const h00 = heights[y * GRID_SIZE + x] * 6;
                    const h10 = heights[y * GRID_SIZE + (x + 1)] * 6;
                    const h01 = heights[(y + 1) * GRID_SIZE + x] * 6;
                    const h11 = heights[(y + 1) * GRID_SIZE + (x + 1)] * 6;

                    // 實際空間座標
                    const px0 = x * cellSize - offset;
                    const px1 = (x + 1) * cellSize - offset;
                    const py0 = y * cellSize - offset;
                    const py1 = (y + 1) * cellSize - offset;

                    // 三角形 1
                    vertices.push(px0, py0, h00,  px1, py0, h10,  px0, py1, h01);
                    // 三角形 2
                    vertices.push(px1, py0, h10,  px1, py1, h11,  px0, py1, h01);
                }
            }

            // 建立 BufferGeometry
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geometry.computeVertexNormals();

            // 套用具有明顯光影立體感的物理材質
            const material = new THREE.MeshStandardMaterial({
                color: 0x4f46e5,
                roughness: 0.2,
                metalness: 0.5,
                side: THREE.DoubleSide,
                flatShading: true
            });

            if (currentMesh) scene.remove(currentMesh);
            currentMesh = new THREE.Mesh(geometry, material);
            currentMesh.rotation.x = -Math.PI / 2; // 水平躺放
            scene.add(currentMesh);

            // 重設鏡頭視角焦點，確保物體出現在畫面正中央
            controls.target.set(0, 0, 0);
            camera.position.set(0, 35, 45);
            controls.update();

            // 4. 切換顯示畫布
            video.style.display = 'none';
            threeCanvas.style.display = 'block';
            
            // 強制重繪
            onWindowResize();

            captureMenu.classList.add('hidden');
            previewMenu.classList.remove('hidden');
            hideLoading();
            infoText.innerText = "✨ 3D 模型已成功生成！請在畫面上滑動旋轉";
        }

        function resetScanner() {
            video.style.display = 'block';
            threeCanvas.style.display = 'none';
            captureMenu.classList.remove('hidden');
            previewMenu.classList.add('hidden');
            infoText.innerText = "請將鏡頭對準物體，保持光線充足";
            if (currentMesh) {
                scene.remove(currentMesh);
                currentMesh = null;
            }
        }

        // ==================== 穩定的 OBJ / STL 匯出系統 ====================
        function exportOBJ() {
            if (!currentMesh) return;
            let objText = "# 3D Scanner Mobile OBJ\n";
            const pos = currentMesh.geometry.attributes.position;

            for (let i = 0; i < pos.count; i++) {
                // 水平轉換後的空間座標
                objText += `v ${pos.getX(i).toFixed(4)} ${pos.getZ(i).toFixed(4)} ${(-pos.getY(i)).toFixed(4)}\n`;
            }
            for (let i = 1; i <= pos.count; i += 3) {
                objText += `f ${i} ${i+1} ${i+2}\n`;
            }
            downloadFile(objText, 'model.obj');
        }

        function exportSTL() {
            if (!currentMesh) return;
            let stlText = "solid MobileModel\n";
            const pos = currentMesh.geometry.attributes.position;

            for (let i = 0; i < pos.count; i += 3) {
                stlText += `  facet normal 0 0 0\n    outer loop\n`;
                stlText += `      vertex ${pos.getX(i).toFixed(4)} ${pos.getZ(i).toFixed(4)} ${(-pos.getY(i)).toFixed(4)}\n`;
                stlText += `      vertex ${pos.getX(i+1).toFixed(4)} ${pos.getZ(i+1).toFixed(4)} ${(-pos.getY(i+1)).toFixed(4)}\n`;
                stlText += `      vertex ${pos.getX(i+2).toFixed(4)} ${pos.getZ(i+2).toFixed(4)} ${(-pos.getY(i+2)).toFixed(4)}\n`;
                stlText += `    endloop\n  endfacet\n`;
            }
            stlText += "endsolid MobileModel\n";
            downloadFile(stlText, 'model.stl');
        }

        function downloadFile(content, fileName) {
            const a = document.createElement("a");
            const file = new Blob([content], { type: 'text/plain' });
            a.href = URL.createObjectURL(file);
            a.download = fileName;
            a.click();
            URL.revokeObjectURL(a.href);
        }

        function showLoading(text) {
            loadingText.innerText = text;
            loadingOverlay.style.display = 'flex';
        }

        function hideLoading() {
            loadingOverlay.style.display = 'none';
        }

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        window.onload = () => {
            initCamera();
            initThree();
        };
    </script>
</body>
</html>
