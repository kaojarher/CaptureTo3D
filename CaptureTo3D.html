<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 行動相機建模工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-dark: #111827;
            --panel-bg: rgba(31, 41, 55, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 頂部狀態列 */
        header {
            background: rgba(0, 0, 0, 0.5);
            padding: 12px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 1px;
            z-index: 10;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 主要視聯網域 */
        #container {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* 相機預覽與 3D 畫布 */
        video, canvas, #three-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #three-canvas {
            display: none;
            z-index: 2;
        }

        /* 濾鏡/處理中動畫遮罩 */
        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
            display: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 下方控制面板 */
        .control-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover { background: var(--primary-hover); }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        .btn-secondary:hover { background: rgba(255, 255, 255, 0.25); }

        .hidden { display: none !important; }
        
        #info-text {
            font-size: 0.85rem;
            color: #9ca3af;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>3D SCANNER Mobile</header>

    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="capture-canvas" style="display:none;"></canvas>
        <div id="three-canvas"></div>

        <div id="loading-overlay">
            <div class="spinner"></div>
            <p id="loading-text">正在分析影像結構...</p>
        </div>
    </div>

    <div class="control-panel">
        <p id="info-text">請將鏡頭對準物體，保持光線充足</p>
        
        <div id="capture-menu" class="btn-group">
            <button class="btn-primary" onclick="captureAndProcess()">
                📸 拍攝並生成 3D 模型
            </button>
        </div>

        <div id="preview-menu" class="btn-group hidden">
            <button class="btn-secondary" onclick="resetScanner()">🔄 重拍</button>
            <button class="btn-primary" onclick="exportOBJ()">💾 OBJ</button>
            <button class="btn-primary" onclick="exportSTL()">💾 STL</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const captureCanvas = document.getElementById('capture-canvas');
        const threeCanvas = document.getElementById('three-canvas');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const captureMenu = document.getElementById('capture-menu');
        const previewMenu = document.getElementById('preview-menu');
        const infoText = document.getElementById('info-text');

        let scene, camera, renderer, controls, currentMesh;
        let generatedGeometry; // 儲存當前生成的幾何體用於匯出

        // 啟動手機相機
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 640 } },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                alert('無法啟動相機，請確認已授予權限且使用 HTTPS 連線：' + err.message);
                infoText.innerText = "相機啟動失敗";
            }
        }

        // 初始化 Three.js 環境
        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111827);

            camera = new THREE.PerspectiveCamera(45, threeCanvas.clientWidth / threeCanvas.clientHeight, 0.1, 1000);
            camera.position.set(0, 40, 60);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(threeCanvas.clientWidth, threeCanvas.clientHeight);
            renderer.shadowMap.enabled = true;
            threeCanvas.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // 光源設定
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 40, 20);
            scene.add(dirLight);

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            if (renderer && scene && camera) renderer.render(scene, camera);
        }

        function onWindowResize() {
            if (!camera || !renderer) return;
            camera.aspect = threeCanvas.clientWidth / threeCanvas.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(threeCanvas.clientWidth, threeCanvas.clientHeight);
        }

        // 拍照與自動影像處理
        async function captureAndProcess() {
            showLoading("擷取影像中...");
            
            // 設定畫布尺寸
            const size = 128; // 為了在手機端流暢執行，解析度設定為 128x128 網格
            captureCanvas.width = size;
            captureCanvas.height = size;
            const ctx = captureCanvas.getContext('2d');
            
            // 從視訊串流中裁切正方形區塊並繪製至畫布
            const minDim = Math.min(video.videoWidth, video.videoHeight);
            const sx = (video.videoWidth - minDim) / 2;
            const sy = (video.videoHeight - minDim) / 2;
            ctx.drawImage(video, sx, sy, minDim, minDim, 0, 0, size, size);

            // 進入影像處理階段
            showLoading("正在進行影像邊緣與深度優化...");
            await delay(600); 

            const imgData = ctx.getImageData(0, 0, size, size);
            const pixels = imgData.data;

            // 影像處理：轉為灰階並加強對比度（模擬 CV 深度圖分析）
            const depthData = new Float32Array(size * size);
            for (let i = 0; i < pixels.length; i += 4) {
                const r = pixels[i];
                const g = pixels[i + 1];
                const b = pixels[i + 2];
                // 經典灰階公式
                let grayscale = 0.299 * r + 0.587 * g + 0.114 * b;
                // 增強對比，凸顯 3D 起伏
                grayscale = (grayscale - 128) * 1.2 + 128;
                depthData[i / 4] = Math.max(0, Math.min(255, grayscale)) / 255.0;
            }

            showLoading("正在建構 3D 實體網格...");
            await delay(400);

            // 根據影像深度數據生成 3D 物件 (PlaneGeometry 高度圖拓撲)
            if (currentMesh) scene.remove(currentMesh);

            const geometry = new THREE.PlaneGeometry(30, 30, size - 1, size - 1);
            const posAttr = geometry.attributes.position;

            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const index = y * size + x;
                    // 使用影像灰階值作為 Z 軸高度（乘上強度係數 6）
                    const zValue = depthData[index] * 6;
                    
                    // PlaneGeometry 的頂點順序與像素對應
                    posAttr.setZ(index, zValue);
                }
            }
            geometry.computeVertexNormals();
            generatedGeometry = geometry; // 快取供匯出使用

            // 材質設定（金屬質感以利檢視物理細節）
            const material = new THREE.MeshStandardMaterial({
                color: 0x3b82f6,
                roughness: 0.3,
                metalness: 0.2,
                side: THREE.DoubleSide,
                flatShading: true
            });

            currentMesh = new THREE.Mesh(geometry, material);
            currentMesh.rotation.x = -Math.PI / 2; // 讓物體平放
            scene.add(currentMesh);

            // 切換 UI 狀態
            video.style.display = 'none';
            threeCanvas.style.display = 'block';
            captureMenu.classList.add('hidden');
            previewMenu.classList.remove('hidden');
            hideLoading();
            infoText.innerText = "✨ 3D 模型生成成功！可滑動旋轉檢視";
        }

        // 重設工具回到拍照狀態
        function resetScanner() {
            video.style.display = 'block';
            threeCanvas.style.display = 'none';
            captureMenu.classList.remove('hidden');
            previewMenu.classList.add('hidden');
            infoText.innerText = "請將鏡頭對準物體，保持光線充足";
            if (currentMesh) {
                scene.remove(currentMesh);
                currentMesh = null;
            }
        }

        // ==================== 3D 模型匯出功能 ====================

        // 1. 匯出 OBJ 功能
        function exportOBJ() {
            if (!generatedGeometry) return;
            let objText = "# 3D Scanner Mobile Generated OBJ\n";
            const pos = generatedGeometry.attributes.position;
            const norm = generatedGeometry.attributes.normal;

            // 寫入頂點
            for (let i = 0; i < pos.count; i++) {
                // 套用目前網格平放的旋轉矩陣變換
                objText += `v ${pos.getX(i).toFixed(4)} ${(pos.getZ(i)).toFixed(4)} ${(-pos.getY(i)).toFixed(4)}\n`;
            }
            // 寫入法向量
            for (let i = 0; i < norm.count; i++) {
                objText += `vn ${norm.getX(i).toFixed(4)} ${norm.getZ(i).toFixed(4)} ${(-norm.getY(i)).toFixed(4)}\n`;
            }
            // 寫入面 (索引從 1 開始)
            const index = generatedGeometry.index;
            if (index) {
                for (let i = 0; i < index.count; i += 3) {
                    objText += `f ${index.getX(i)+1}//${index.getX(i)+1} ${index.getY(i)+1}//${index.getY(i)+1} ${index.getZ(i)+1}//${index.getZ(i)+1}\n`;
                }
            } else {
                // 無索引幾何體的面編排
                for (let i = 1; i <= pos.count; i += 3) {
                    objText += `f ${i}//${i} ${i+1}//${i+1} ${i+2}//${i+2}\n`;
                }
            }

            downloadFile(objText, 'model.obj', 'text/plain');
        }

        // 2. 匯出 STL 功能 (文字格式 ASCII)
        function exportSTL() {
            if (!generatedGeometry) return;
            let stlText = "solid MobileScannerModel\n";
            const pos = generatedGeometry.attributes.position;
            
            // 由於 PlaneGeometry 在沒有 index 時是連續頂點，有 index 時需依索引解出三角形
            const index = generatedGeometry.index;
            
            if (index) {
                for (let i = 0; i < index.count; i += 3) {
                    const i1 = index.getX(i), i2 = index.getY(i), i3 = index.getZ(i);
                    stlText += `  facet normal 0 0 0\n    outer loop\n`;
                    stlText += `      vertex ${pos.getX(i1).toFixed(4)} ${pos.getZ(i1).toFixed(4)} ${(-pos.getY(i1)).toFixed(4)}\n`;
                    stlText += `      vertex ${pos.getX(i2).toFixed(4)} ${pos.getZ(i2).toFixed(4)} ${(-pos.getY(i2)).toFixed(4)}\n`;
                    stlText += `      vertex ${pos.getX(i3).toFixed(4)} ${pos.getZ(i3).toFixed(4)} ${(-pos.getY(i3)).toFixed(4)}\n`;
                    stlText += `    endloop\n  endfacet\n`;
                }
            }
            stlText += "endsolid MobileScannerModel\n";
            downloadFile(stlText, 'model.stl', 'text/plain');
        }

        // 通用下載觸發器
        function downloadFile(content, fileName, contentType) {
            const a = document.createElement("a");
            const file = new Blob([content], { type: contentType });
            a.href = URL.createObjectURL(file);
            a.download = fileName;
            a.click();
            URL.revokeObjectURL(a.href);
        }

        // ==================== 輔助工具 ====================
        function showLoading(text) {
            loadingText.innerText = text;
            loadingOverlay.style.display = 'flex';
        }

        function hideLoading() {
            loadingOverlay.style.display = 'none';
        }

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // 初始化
        window.onload = () => {
            initCamera();
            initThree();
        };
    </script>
</body>
</html>
